<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
color:#1e293b;
}

.container{
background:#ffffff;
padding:35px;
border-radius:16px;
width:90%;
max-width:450px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
border-top:5px solid #2563eb;
}

h1{text-align:center;margin-bottom:4px;color:#0f172a;}
h3{text-align:center;color:#64748b;margin-top:0;}

.event-info{
text-align:center;
font-size:14px;
background:#f1f5f9;
padding:14px;
border-radius:10px;
margin-bottom:18px;
line-height:1.6;
border:1px solid #e2e8f0;
}

.countdown{
text-align:center;
font-size:16px;
margin-bottom:20px;
font-weight:600;
color:#2563eb;
}

label{font-size:14px;}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

button{
width:100%;
padding:13px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.rules-link{
display:block;
margin-top:8px;
margin-bottom:12px;
text-align:center;
color:#2563eb;
text-decoration:none;
}

.success{
display:none;
text-align:center;
color:#16a34a;
margin-top:16px;
}

.badge{
position:fixed;
top:20px;
left:20px;
background:#2563eb;
color:white;
padding:8px 14px;
border-radius:20px;
font-size:13px;
}

</style>

<script>

/* Countdown */

const eventDate = new Date("March 27, 2026 09:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = eventDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
"⏳ Event Starts In: "+days+"d "+hours+"h "+minutes+"m "+seconds+"s";

},1000);

</script>

</head>

<body>

<div class="badge">AI Hackathon 2026</div>

<div class="container">

<h1>AI MINI HACKATHON</h1>
<h3>Spectrum 2k26</h3>

<div class="event-info">
📅 Date: 27 March 2026 <br>
⏰ Duration: 2 Hours Development + 1 Hour Presentation <br>
👨‍💻 Team Size: 2 Members <br>
💰 Entry Fee: ₹200 per team
</div>

<div id="countdown" class="countdown"></div>

<form id="regForm" enctype="multipart/form-data">

<label>Team Name</label>
<input type="text" name="team" required>

<label>Team Leader Name</label>
<input type="text" name="leader" required>

<label>Leader Email</label>
<input type="email" name="email" required>

<label>Leader Phone</label>
<input type="tel" name="phone" required>

<label>Member 2 Name</label>
<input type="text" name="member2" required>

<label>College Name</label>
<input type="text" name="college" required>

<label>Department</label>
<input type="text" name="department" required>

<label>Payment Screenshot</label>
<input type="file" name="payment" accept="image/*" required>

<a class="rules-link" href="SPECTRUM_2K26_.pdf" target="_blank">
📄 Download Rules and Regulations
</a>

<button type="submit">Register Team</button>

<div id="successMsg" class="success">
✅ Registration submitted successfully!
</div>

</form>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbx0nN2YgnoM_eoNJOozq_uYV1LETBvT8dfq1lzqnNm_6Q4QvbLf4wEFjJRftHfL1OrC/exec";

document.getElementById("regForm").addEventListener("submit",function(e){

e.preventDefault();

const formData=new FormData(this);

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(res=>{
document.getElementById("successMsg").style.display="block";
})
.catch(err=>console.log(err));

});

</script>

</body>
</html>
