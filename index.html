<!DOCTYPE html>
<html>
<head>
<title>AI Mini Hackathon Registration</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#020617,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#0f172a;
padding:35px;
border-radius:14px;
width:430px;
box-shadow:0 10px 35px rgba(0,0,0,0.6);
transition:0.3s;
}

.container:hover{
transform:translateY(-5px);
}

h1{
text-align:center;
margin-bottom:4px;
letter-spacing:1px;
}

h3{
text-align:center;
color:#94a3b8;
margin-top:0;
font-weight:400;
}

.event-info{
text-align:center;
font-size:14px;
color:#cbd5f5;
margin-bottom:10px;
line-height:1.6;
}

.countdown{
text-align:center;
font-size:18px;
margin-bottom:20px;
font-weight:600;
color:#38bdf8;
}

label{
font-size:14px;
color:#e2e8f0;
}

input{
width:100%;
padding:11px;
margin-top:6px;
margin-bottom:14px;
border-radius:6px;
border:1px solid #334155;
background:#020617;
color:white;
transition:0.25s;
}

input:focus{
outline:none;
border:1px solid #38bdf8;
box-shadow:0 0 6px rgba(56,189,248,0.6);
}

button{
width:100%;
padding:13px;
margin-top:10px;
background:linear-gradient(90deg,#22c55e,#16a34a);
border:none;
border-radius:7px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 10px rgba(34,197,94,0.7);
}

.rules-link{
display:block;
margin-top:8px;
margin-bottom:12px;
text-align:center;
color:#60a5fa;
text-decoration:none;
font-size:14px;
}

.rules-link:hover{
text-decoration:underline;
}

.success{
display:none;
text-align:center;
color:#22c55e;
margin-top:16px;
font-weight:500;
}

</style>

<script>

function showSuccess(e){
e.preventDefault();
document.getElementById("successMsg").style.display="block";
}

/* Countdown Timer */

const eventDate = new Date("March 27, 2026 09:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = eventDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
"⏳ Event Starts In: " +
days + "d " +
hours + "h " +
minutes + "m " +
seconds + "s";

},1000);

</script>
<script>

document.addEventListener("DOMContentLoaded", function(){

const scriptURL = "https://script.google.com/macros/s/AKfycbx0nN2YgnoM_eoNJOozq_uYV1LETBvT8dfq1lzqnNm_6Q4QvbLf4wEFjJRftHfL1OrC/exec";

document.querySelector("form").addEventListener("submit", function(e){

e.preventDefault();

const data = {
team: document.querySelectorAll("input")[0].value,
leader: document.querySelectorAll("input")[1].value,
email: document.querySelectorAll("input")[2].value,
phone: document.querySelectorAll("input")[3].value,
member2: document.querySelectorAll("input")[4].value,
college: document.querySelectorAll("input")[5].value,
department: document.querySelectorAll("input")[6].value
};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>{
document.getElementById("successMsg").style.display="block";
});

});

});

</script>

</head>

<body>

<div class="container">

<h1>AI MINI HACKATHON</h1>
<h3>Spectrum 2k26</h3>

<div class="event-info">
📅 27 March 2026 <br>
👨‍💻 Team Size: 2 Members <br>
💰 Entry Fee: ₹200 per team
</div>

<div id="countdown" class="countdown"></div>

<form onsubmit="showSuccess(event)">

<label>Team Name</label>
<input type="text" required>

<label>Team Leader Name</label>
<input type="text" required>

<label>Leader Email</label>
<input type="email" required>

<label>Leader Phone</label>
<input type="tel" required>

<label>Member 2 Name</label>
<input type="text" required>

<label>College Name</label>
<input type="text" required>

<label>Department</label>
<input type="text" required>

<label>Payment Screenshot</label>
<input type="file" required>

<a class="rules-link" href="SPECTRUM_2K26_.pdf" target="_blank">
📄 Download Rules and Regulations
</a>

<button type="submit">Register Team</button>

<div id="successMsg" class="success">
✅ Registration submitted successfully!
</div>

</form>

</div>

</body>

</html>
